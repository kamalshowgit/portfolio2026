<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}{{ seo_title|default:profile.name }}{% endblock %}</title>
    <meta name="description" content="{{ seo_description|default:profile.bio|striptags }}">
    <meta name="keywords" content="{{ seo_keywords|default:'Kamal Soni, Data Analytics, Machine Learning, HSBC, Python, SQL' }}">
    <meta name="author" content="{{ seo_author|default:profile.name }}">
    <meta name="robots" content="{{ seo_robots|default:'index, follow' }}">
    <link rel="canonical" href="{{ seo_canonical_url|default:request.build_absolute_uri }}">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ seo_title|default:profile.name }}">
    <meta property="og:description" content="{{ seo_description|default:profile.bio|striptags }}">
    <meta property="og:url" content="{{ seo_canonical_url|default:request.build_absolute_uri }}">
    {% if seo_image_url %}<meta property="og:image" content="{{ seo_image_url }}">{% endif %}
    <meta property="og:site_name" content="{{ profile.name|default:'Kamal Soni Portfolio' }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ seo_title|default:profile.name }}">
    <meta name="twitter:description" content="{{ seo_description|default:profile.bio|striptags }}">
    {% if seo_image_url %}<meta name="twitter:image" content="{{ seo_image_url }}">{% endif %}
    {% if seo_json_ld %}<script type="application/ld+json">{{ seo_json_ld|safe }}</script>{% endif %}
    <style>
      :root{
        --bg:#f6f8fb; /* page background */
        --card:#ffffff; /* card background */
        --muted:#64748b; /* muted text */
        --accent:#2563eb; /* accent */
        --glass:rgba(255,255,255,0.7);
      }
      html,body{height:100%}
      body{font-family:system-ui, -apple-system, Roboto, Arial, sans-serif;background:var(--bg);color:#0f172a;margin:0}
      .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:transparent;border-bottom:1px solid rgba(15,23,42,0.04)}
      .brand{font-weight:700;font-size:18px;color:var(--accent)}
      .edit-btn{display:inline-block;padding:8px 12px;background:var(--accent);color:white;border-radius:8px;text-decoration:none;border:none}
      .container{max-width:1200px;margin:24px auto;padding:0 16px}
      .glass{background:var(--card);box-shadow:0 6px 20px rgba(15,23,42,0.06);border-radius:10px;padding:18px}
      .blurred{filter:blur(4px);pointer-events:none}
      .dark-toggle{cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);color:var(--muted);background:transparent}
      /* layout helpers */
      .layout{display:flex;gap:20px}
      .sidebar{width:320px}
      .main{flex:1}
      .card + .card{margin-top:14px}
      .small{font-size:13px;color:var(--muted)}
      a{color:var(--accent)}
      @media (max-width: 760px){
        .topbar{padding:10px 14px}
        .brand{font-size:16px}
        .container{margin:16px auto;padding:0 12px}
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="topbar">
      <div class="brand">{{ profile.name }}</div>
      <div></div>
    </div>

    <div class="container">
      {% block content %}{% endblock %}
    </div>

    <!-- Login modal -->
    <div id="loginModal" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;z-index:1000">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.5)"></div>
      <div style="position:relative;z-index:1001;width:420px">
        <div class="glass" style="padding:18px">
          <h3 style="margin-top:0">Enter password to edit</h3>
          <div id="loginError" style="color:#ffb4b4"></div>
          <form id="loginForm">
            <input name="username" placeholder="username" value="admin" style="width:100%;padding:8px;margin-bottom:8px" />
            <input name="password" type="password" placeholder="password" style="width:100%;padding:8px;margin-bottom:8px" />
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button type="button" id="loginCancel" class="dark-toggle">Cancel</button>
              <button type="submit" class="edit-btn">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Login modal handling
      const loginModal = document.getElementById('loginModal');
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      const loginCancel = document.getElementById('loginCancel');
      const container = document.querySelector('.container');
      const isLoggedIn = {{ is_logged_in|yesno:"true,false" }};

      function openLogin(){
        loginModal.style.display='flex';
        container.classList.add('blurred');
      }
      function closeLogin(){
        loginModal.style.display='none';
        container.classList.remove('blurred');
        loginError.textContent='';
      }

      if (loginCancel) {
        loginCancel.addEventListener('click', closeLogin);
      }

      // Hidden admin access: Shift + E
      document.addEventListener('keydown', (e) => {
        if (e.shiftKey && (e.key === 'E' || e.key === 'e')) {
          e.preventDefault();
          if (isLoggedIn) {
            window.location.href = '{% url "personal:edit" %}';
            return;
          }
          openLogin();
        }
      });

      // CSRF helper
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
      }
      const csrftoken = getCookie('csrftoken');

      loginForm?.addEventListener('submit', async (ev)=>{
        ev.preventDefault();
        const data = new FormData(loginForm);
        const resp = await fetch('{% url "personal:login" %}', {method:'POST',headers:{'X-Requested-With':'XMLHttpRequest','X-CSRFToken':csrftoken},body:data});
        if(resp.ok){
          const js = await resp.json();
          if(js.success){ closeLogin(); enableEditing(); location.reload(); }
        } else {
          const e = await resp.json(); loginError.textContent = e.error || 'Login failed';
        }
      });

      // Enable inline editing after login
      function enableEditing(){
        // make editable fields contentEditable
        document.querySelectorAll('[data-editable]').forEach(el=>{
          el.contentEditable = true;
          el.style.outline = '2px dashed rgba(124,58,237,0.25)';
        });
        // show save button
        let sb = document.getElementById('inlineSave');
        if(!sb){
          sb = document.createElement('button'); sb.id='inlineSave'; sb.textContent='Save Changes'; sb.className='edit-btn';
          sb.style.position='fixed'; sb.style.right='20px'; sb.style.bottom='20px'; sb.style.zIndex='1100';
          document.body.appendChild(sb);
          sb.addEventListener('click', saveInline);
        }
      }

      async function saveInline(){
        const btn = document.getElementById('inlineSave');
        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Saving...';
        }
        const payload = new FormData();
        document.querySelectorAll('[data-field]').forEach(el=>{
          const key = el.getAttribute('data-field');
          payload.append(key, el.innerText.trim());
        });
        // photo input if present
        const photoInput = document.getElementById('photoInput');
        if(photoInput && photoInput.files.length) payload.append('photo', photoInput.files[0]);
        const resp = await fetch('{% url "personal:update_profile" %}', {method:'POST', headers:{'X-Requested-With':'XMLHttpRequest','X-CSRFToken':csrftoken}, body: payload});
        if(resp.ok){
          const js = await resp.json();
          if (btn) {
            btn.textContent = 'Saved';
            setTimeout(() => { btn.textContent = 'Save Changes'; btn.disabled = false; }, 900);
          }
          // update photo if provided
          if(js.profile.photo_url){ const img = document.querySelector('[data-field="photo_preview"]'); if(img) img.src = js.profile.photo_url }
        } else {
          const e = await resp.json();
          if (btn) {
            btn.textContent = 'Retry Save';
            btn.disabled = false;
          }
          alert(e.error || 'Save failed');
        }
      }

      // On load: if already logged in (server session), enable editing
      if(document.querySelector('a[href*="logout"]')){
        enableEditing();
      }
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
